<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ganga Home — Dashboard de Negocio</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#080c12;--bg2:#0d1117;--bg3:#161b22;--bg4:#1c2230;
  --border:#21262d;--border2:#30363d;
  --txt:#e6edf3;--txt2:#8b949e;--txt3:#484f58;
  --green:#3fb950;--green2:#0a2a0e;--green3:#1a4a1e;
  --blue:#58a6ff;--blue2:#0a1a2a;--blue3:#1a3a5a;
  --purple:#bc8cff;--purple2:#1a0a2a;--purple3:#3a1a5a;
  --amber:#d29922;--amber2:#2a1a00;--amber3:#4a3200;
  --red:#f85149;--red2:#2a0000;--red3:#4a1010;
  --teal:#39d0a0;
  --font:'Sora',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--txt);min-height:100vh;overflow:hidden}
.app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:16px 14px 12px;border-bottom:1px solid var(--border)}
.logo-name{font-size:13px;font-weight:700;color:var(--txt);letter-spacing:.01em}
.logo-sub{font-size:10px;color:var(--txt3);margin-top:2px}
.nav{flex:1;padding:8px 6px;overflow-y:auto}
.nav-section{font-size:9px;font-weight:600;color:var(--txt3);letter-spacing:.1em;text-transform:uppercase;padding:10px 8px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--txt2);margin-bottom:1px;border:none;background:none;width:100%;text-align:left;transition:all .12s;font-family:var(--font)}
.nav-item:hover{background:var(--bg3);color:var(--txt)}
.nav-item.active{background:var(--bg4);color:var(--txt);border-left:2px solid var(--purple)}
.nav-item svg{flex-shrink:0;width:13px;height:13px;opacity:.7}
.nav-item.active svg{opacity:1}

/* MAIN */
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left h2{font-size:14px;font-weight:600;color:var(--txt)}
.topbar-left p{font-size:11px;color:var(--txt3);margin-top:1px}

/* FILTROS GLOBALES */
.global-filters{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.gf-label{font-size:10px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.gf-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
input[type=text],input[type=date],select{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--txt);font-size:11px;font-family:var(--font);padding:5px 9px;outline:none;transition:border .12s}
input[type=text]:focus,input[type=date]:focus,select:focus{border-color:var(--purple)}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none}
.search-wrap input{padding-left:26px;width:160px}
.filter-btn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--txt2);font-size:11px;font-family:var(--font);padding:5px 12px;cursor:pointer;transition:all .12s}
.filter-btn:hover{border-color:var(--border2);color:var(--txt)}
.filter-btn.active{background:var(--purple2);border-color:var(--purple);color:var(--purple)}
.clear-btn{font-size:10px;color:var(--txt3);cursor:pointer;padding:4px 8px;border-radius:4px;transition:all .12s;border:none;background:none;font-family:var(--font)}
.clear-btn:hover{color:var(--red)}
.results-count{font-size:10px;color:var(--txt3);margin-left:auto;white-space:nowrap}

/* SUBTABS */
.subtabs{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 18px;display:flex;gap:2px;overflow-x:auto;flex-shrink:0}
.stab{padding:8px 14px;font-size:11px;font-weight:500;color:var(--txt3);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;font-family:var(--font)}
.stab.active{color:var(--blue);border-bottom-color:var(--blue)}
.stab:hover:not(.active){color:var(--txt)}

/* PAGE */
.page{flex:1;overflow-y:auto;padding:16px 18px}

/* CARDS */
.kgrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:14px}
.kgrid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:14px}
.kgrid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:14px}
.kc{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.kc.g{border-left:2px solid var(--green)}.kc.b{border-left:2px solid var(--blue)}
.kc.p{border-left:2px solid var(--purple)}.kc.y{border-left:2px solid var(--amber)}
.kc.r{border-left:2px solid var(--red)}
.kl{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.kv{font-size:20px;font-weight:700;line-height:1.1}
.kv.g{color:var(--green)}.kv.b{color:var(--blue)}.kv.p{color:var(--purple)}.kv.y{color:var(--amber)}.kv.r{color:var(--red)}
.ks{font-size:10px;margin-top:4px;color:var(--txt3)}
.ks.up{color:var(--green)}.ks.dn{color:var(--red)}

/* PANEL */
.panel{background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px}
.ph{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.ph-left{display:flex;flex-direction:column;gap:2px}
.pt{font-size:12px;font-weight:600;color:var(--txt)}
.ps{font-size:10px;color:var(--txt3)}
.ph-filters{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pb{padding:0}
.panel-search{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* TABLE */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;border-bottom:1px solid var(--border);background:var(--bg2);text-align:right;white-space:nowrap;cursor:pointer;user-select:none;transition:color .12s}
.tbl th:first-child{text-align:center;width:30px}
.tbl th:nth-child(2){text-align:left}
.tbl th:nth-child(3){text-align:left}
.tbl th.sorted{color:var(--blue)}
.tbl th:hover{color:var(--txt)}
.sort-icon{font-size:9px;margin-left:3px;color:var(--txt3)}
.tbl td{padding:9px 10px;border-bottom:1px solid var(--bg4);color:var(--txt);text-align:right;vertical-align:middle}
.tbl td:first-child{text-align:center;color:var(--txt3);font-size:10px}
.tbl td:nth-child(2){text-align:left}
.tbl td:nth-child(3){text-align:left}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
.g-txt{color:var(--green);font-weight:600}
.b-txt{color:var(--blue)}
.p-txt{color:var(--purple)}
.y-txt{color:var(--amber)}
.r-txt{color:var(--red);font-weight:600}
.mono{font-family:var(--mono);font-size:10px;color:var(--txt3)}
.pname{font-size:12px;font-weight:500;color:var(--txt)}

/* PILLS */
.pill{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.pill.g{background:var(--green2);color:var(--green);border:1px solid var(--green3)}
.pill.r{background:var(--red2);color:var(--red);border:1px solid var(--red3)}
.pill.y{background:var(--amber2);color:var(--amber);border:1px solid var(--amber3)}
.pill.b{background:var(--blue2);color:var(--blue);border:1px solid var(--blue3)}
.pill.p{background:var(--purple2);color:var(--purple);border:1px solid var(--purple3)}

/* BAR ROWS */
.brow{display:flex;align-items:center;gap:8px;margin-bottom:7px;padding:0 14px}
.bl{font-size:11px;color:var(--txt2);width:140px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bt{flex:1;background:var(--bg2);border-radius:2px;height:6px;overflow:hidden}
.bf{height:6px;border-radius:2px;transition:width .4s}
.bv{font-size:11px;font-weight:600;color:var(--txt);width:140px;text-align:right;flex-shrink:0}

/* CHART */
.chart-wrap{position:relative;width:100%;height:220px;padding:14px}
.chart-wrap.tall{height:260px}
.chart-wrap.sm{height:160px}

/* ALERT CARDS */
.alert-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:12px}
.ac{background:var(--red2);border:1px solid var(--red3);border-radius:8px;padding:11px 13px}
.an{font-size:11px;font-weight:500;color:#fca5a5;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ask{font-size:10px;color:#6b1111;margin-bottom:7px;font-family:var(--mono)}
.ab{display:flex;align-items:center;justify-content:space-between}
.ar-lbl{font-size:10px;color:var(--txt2)}
.rbtn{font-size:10px;font-weight:700;color:var(--red);background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);border-radius:4px;padding:3px 8px;cursor:pointer;font-family:var(--font)}
.rbtn:hover{background:rgba(248,81,73,.2)}

/* SEG CARDS */
.sc{border-radius:8px;padding:14px;border:1px solid}
.sc.p{background:rgba(188,140,255,.06);border-color:var(--purple3)}
.sc.b{background:rgba(88,166,255,.06);border-color:var(--blue3)}
.sc.g{background:rgba(63,185,80,.06);border-color:var(--green3)}
.sl{font-size:10px;color:var(--txt2);margin-bottom:6px}
.sv{font-size:22px;font-weight:700;color:var(--txt)}
.ss{font-size:10px;color:var(--txt3);margin-top:3px}

/* PARETO */
.pc{border-radius:8px;padding:14px;border:1px solid}
.pc.a{background:rgba(188,140,255,.06);border-color:var(--purple3)}
.pc.b2{background:rgba(248,81,73,.06);border-color:var(--red3)}
.pc.c{background:rgba(110,118,129,.06);border-color:var(--border2)}
.pcl{font-size:10px;color:var(--txt2);margin-bottom:3px}
.pcv{font-size:18px;font-weight:700;color:var(--txt)}
.pcs{font-size:10px;color:var(--txt3);margin-top:2px}
.pcbar{height:3px;border-radius:2px;margin-top:8px}

/* BOUGHT TOGETHER */
.pbi{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px 14px;display:flex;align-items:center;gap:12px;margin-bottom:6px}
.pbn{background:var(--purple);color:#1a0040;font-size:11px;font-weight:700;border-radius:20px;padding:3px 10px;flex-shrink:0}
.pbp{font-size:11px;color:var(--txt)}
.pb-sep{color:var(--txt3);margin:0 6px}

/* MISC */
.two{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px;margin-bottom:12px}
.section-lbl{font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.empty-state{text-align:center;padding:40px 20px;color:var(--txt3);font-size:13px}
.live-pill{background:var(--green2);border:1px solid var(--green3);border-radius:20px;padding:3px 10px;font-size:10px;color:var(--green);display:flex;align-items:center;gap:5px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.badge.r{background:var(--red2);color:var(--red)}
.badge.y{background:var(--amber2);color:var(--amber)}
.badge.g{background:var(--green2);color:var(--green)}
select option{background:var(--bg3);color:var(--txt)}
.tbl-footer{padding:8px 14px;border-top:1px solid var(--border);font-size:10px;color:var(--txt3);display:flex;align-items:center;justify-content:space-between}
.pagination{display:flex;align-items:center;gap:4px}
.pg-btn{background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--txt2);font-size:10px;padding:3px 8px;cursor:pointer;font-family:var(--font)}
.pg-btn:hover{border-color:var(--border2);color:var(--txt)}
.pg-btn.active{background:var(--blue2);border-color:var(--blue);color:var(--blue)}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--blue2);border:1px solid var(--blue3);border-radius:20px;padding:2px 8px;font-size:10px;color:var(--blue)}
.chip-x{cursor:pointer;opacity:.7;font-size:11px}
.chip-x:hover{opacity:1}
.active-filters{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:6px 18px;background:var(--bg2);border-bottom:1px solid var(--border);min-height:0;transition:all .2s}
.active-filters:empty{display:none}
.ml-info-banner{background:rgba(188,140,255,.07);border:1px solid rgba(188,140,255,.2);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--txt2);display:flex;align-items:center;gap:8px;margin-bottom:14px}
.ml-info-banner svg{flex-shrink:0;color:var(--purple)}
.ml-info-banner strong{color:var(--purple)}
.ml-conf-bar{display:inline-block;width:60px;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-right:6px;vertical-align:middle}
.ml-conf-bar span{display:block;height:100%;background:var(--green);border-radius:3px}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">
      <div class="logo-name">Ganga Home</div>
      <div class="logo-sub">Control de negocio</div>
    </div>
    <div class="nav">
      <div class="nav-section">Metricas</div>
      <button class="nav-item active" onclick="showMain('metricas',this)">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Metricas
      </button>
      <button class="nav-item" onclick="showMain('ventas',this)">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Ventas
      </button>
      <div class="nav-section">Inventario</div>
      <button class="nav-item" onclick="showMain('inventario',this)">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>Inventario
      </button>
      <button class="nav-item" onclick="showMain('alertas',this)">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Alertas <span class="badge r" style="margin-left:auto;font-size:9px">6</span>
      </button>
      <div class="nav-section">Analisis</div>
      <button class="nav-item" onclick="showMain('pareto',this)">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>Pareto 80/20
      </button>
      <button class="nav-item" onclick="showMain('clientes',this)">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Clientes
      </button>
      <button class="nav-item" onclick="showMain('costos',this)">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>Costos
      </button>
      <div class="nav-section">Proyecciones</div>
      <button class="nav-item" onclick="showMain('proyecciones',this)">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>Proyecciones
      </button>
      <button class="nav-item" onclick="showMain('ml',this)">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>Machine Learning <span class="badge g" style="margin-left:auto;font-size:9px">NEW</span>
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <h2 id="main-title">Metricas de negocio</h2>
        <p id="main-sub">Indicadores clave de rendimiento</p>
      </div>
      <div class="live-pill"><div class="live-dot"></div>Demo — datos de ejemplo</div>
    </div>

    <!-- FILTROS GLOBALES -->
    <div class="global-filters">
      <span class="gf-label">Filtros</span>
      <div class="search-wrap">
        <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="gf-search" placeholder="Buscar SKU, producto..." oninput="applyFilters()">
      </div>
      <div class="gf-sep"></div>
      <span class="gf-label" style="white-space:nowrap">Periodo:</span>
      <input type="date" id="gf-desde" oninput="applyFilters()">
      <span style="font-size:10px;color:var(--txt3)">al</span>
      <input type="date" id="gf-hasta" oninput="applyFilters()">
      <div class="gf-sep"></div>
      <button class="filter-btn" id="btn-7d" onclick="setRange(7,this)">7d</button>
      <button class="filter-btn active" id="btn-30d" onclick="setRange(30,this)">30d</button>
      <button class="filter-btn" id="btn-90d" onclick="setRange(90,this)">90d</button>
      <button class="filter-btn" id="btn-todos" onclick="setRange(0,this)">Todo</button>
      <div class="gf-sep"></div>
      <select id="gf-estado" onchange="applyFilters()">
        <option value="">Estado: Todos</option>
        <option value="ok">OK</option>
        <option value="bajo">Bajo</option>
        <option value="critico">Critico</option>
      </select>
      <select id="gf-categoria" onchange="applyFilters()">
        <option value="">Categoria: Todas</option>
        <option value="ropa">Ropa de cama</option>
        <option value="acolchados">Acolchados</option>
        <option value="cortinas">Cortinas</option>
        <option value="manteles">Manteles</option>
      </select>
      <button class="clear-btn" onclick="clearFilters()">✕ Limpiar</button>
      <span class="results-count" id="results-count"></span>
    </div>

    <!-- CHIPS FILTROS ACTIVOS -->
    <div class="active-filters" id="active-filters"></div>

    <!-- SUBTABS -->
    <div class="subtabs" id="subtabs-bar"></div>

    <!-- CONTENIDO -->
    <div class="page" id="page-content"></div>
  </div>
</div>

<script>
// ─── DATOS DE EJEMPLO ────────────────────────────────────────
var PRODUCTOS = [
  {rank:1,sku:'SKU0003168',nombre:'Kit Cubre Edredon Dubai Queen',categoria:'ropa',ordenes:167,revenue:5419633,uds:167,conv:2.2,stock:0,promDia:2.0,dias:0,estado:'critico',margenPct:45.5,costo:18000,precio:32999,roi:83.3,clase:'A'},

async function cargarDatosML() {
  try {
    var res = await fetch(WORKER_URL + '/data');
    if (!res.ok) return;
    var d = await res.json();
    if (!d || !d.stockItems) return;
    mlSyncData = d;
    // Reemplazar PRODUCTOS con datos reales del worker
    PRODUCTOS = d.stockItems.map(function(item, i) {
      var unids = item.unidsPeriodo || 0;
      var promDia = item.promDiario || 0;
      var dias = promDia > 0 ? Math.round(item.stock / promDia) : (item.stock > 0 ? 9999 : 0);
      var estado = dias <= 3 ? 'critico' : dias <= 14 ? 'bajo' : 'ok';
      var precio = item.precio || 0;
      var costo = Math.round(precio * 0.55);
      var margen = precio > 0 ? ((precio - costo) / precio * 100) : 0;
      return {
        rank: i+1,
        sku: item.sku || item.pubId || '',
        nombre: item.titulo || '',
        categoria: detectarCategoria(item.titulo || ''),
        ordenes: unids,
        revenue: Math.round(unids * precio),
        uds: unids,
        conv: 1.5,
        stock: item.stock || 0,
        promDia: promDia,
        dias: dias,
        estado: estado,
        margenPct: Math.round(margen * 10) / 10,
        costo: costo,
        precio: precio,
        roi: costo > 0 ? Math.round((precio - costo) / costo * 100 * 10) / 10 : 0,
        clase: unids > 50 ? 'A' : unids > 20 ? 'B' : 'C',
        uds7: item.uds7 || 0,
        uds14: item.uds14 || 0,
        uds15: item.uds15 || 0,
      };
    }).filter(function(p){ return p.nombre; })
      .sort(function(a,b){ return b.revenue - a.revenue; });

    filteredData = PRODUCTOS.slice();
    // Actualizar badge de conectado
    var badge = document.querySelector('.live-pill');
    if (badge) {
      badge.innerHTML = '<div class="live-dot"></div>Conectado · sync ' + new Date(d.syncedAt).toLocaleTimeString('es-AR');
      badge.style.background = 'var(--green2)';
    }
    renderPage();
  } catch(e) {
    console.error('Error cargando datos ML:', e);
  }
}

// ─── UTILIDADES ESTADÍSTICAS ──────────────────────────────────
function linReg(xs, ys) {
  var n = xs.length, sx=0,sy=0,sxy=0,sxx=0;
  for(var i=0;i<n;i++){sx+=xs[i];sy+=ys[i];sxy+=xs[i]*ys[i];sxx+=xs[i]*xs[i];}
  var m=(n*sxy-sx*sy)/(n*sxx-sx*sx||1);
  var b=(sy-m*sx)/n;
  return {m:m,b:b,predict:function(x){return Math.max(0,m*x+b);}};
}

function stdDev(arr) {
  var mean=arr.reduce(function(s,v){return s+v;},0)/arr.length;
  var variance=arr.reduce(function(s,v){return s+Math.pow(v-mean,2);},0)/arr.length;
  return {mean:mean,std:Math.sqrt(variance)};
}

function movingAvg(arr, w) {
  return arr.map(function(v,i){
    if(i<w-1) return null;
    var s=0; for(var j=0;j<w;j++) s+=arr[i-j];
    return s/w;
  });
}

// Generar serie histórica diaria sintética para cada producto
function genHistoria(prod, dias) {
  var serie = [];
  var base = prod.promDia || 0.5;
  var seed = prod.sku.charCodeAt(0)+prod.sku.charCodeAt(prod.sku.length-1);
  var rng = function(s){var x=Math.sin(s)*10000;return x-Math.floor(x);};
  for(var i=0;i<dias;i++){
    var estacional = 1 + 0.3*Math.sin((i+seed%7)*2*Math.PI/7);
    var tendencia = 1 + 0.005*i;
    var ruido = 0.7 + rng(seed+i)*0.6;
    var v = Math.max(0, Math.round(base * estacional * tendencia * ruido * 10)/10);
    serie.push(v);
  }
  return serie;
}

// ─── 1. FORECAST INTELIGENTE ──────────────────────────────────
function renderMLForecast() {
  var c = document.getElementById('page-content');
  // Calcular forecasts para todos los productos
  var forecasts = filteredData.map(function(prod) {
    var hist = genHistoria(prod, 30);
    var xs = hist.map(function(v,i){return i;});
    var reg = linReg(xs, hist);
    var proy7 = 0;
    for(var i=30;i<37;i++) proy7 += reg.predict(i);
    var proy30 = 0;
    for(var i=30;i<60;i++) proy30 += reg.predict(i);
    var promReal = hist.reduce(function(s,v){return s+v;},0)/30;
    var tendencia = reg.m > 0.01 ? 'up' : reg.m < -0.01 ? 'dn' : 'ne';
    var tendPct = promReal > 0 ? (reg.m*30/promReal*100).toFixed(1) : '0';
    return {
      sku:prod.sku, nombre:prod.nombre, estado:prod.estado,
      proy7:Math.round(proy7), proy30:Math.round(proy30),
      promReal:promReal.toFixed(2),
      tendencia:tendencia, tendPct:tendPct,
      conf: Math.min(95, Math.max(60, 85 - Math.abs(reg.m)*10)).toFixed(0),
      hist:hist, reg:reg
    };

function renderFcstChart(f) {
  if(!f) return;
  var hist = f.hist || [];
  var labels = [];
  var hd = []; var fd = [];
  var hoy = new Date();
  for(var i=0;i<30;i++){var d=new Date(hoy);d.setDate(d.getDate()-30+i);labels.push(d.getDate()+'/'+(d.getMonth()+1));hd.push(hist[i]||0);fd.push(null);}
  hd.push(hist[29]||0); fd.push(hist[29]||0);
  labels.push('hoy');
  for(var i=1;i<=14;i++){var d=new Date(hoy);d.setDate(d.getDate()+i);labels.push(d.getDate()+'/'+(d.getMonth()+1));hd.push(null);fd.push(Math.max(0,Math.round(f.reg.predict(30+i)*10)/10));}
  mkChart('ch-ml-fc','line',labels,
    [{label:'Ventas reales',data:hd,borderColor:'#58a6ff',backgroundColor:'rgba(88,166,255,0.08)',fill:true,tension:.3,pointRadius:2,borderWidth:2},
     {label:'Forecast',data:fd,borderColor:'#3fb950',backgroundColor:'rgba(63,185,80,0.06)',fill:true,tension:.3,pointRadius:2,borderWidth:2,borderDash:[5,3]}],
    {plugins:{legend:{display:true,position:'top',labels:{color:'#6e7681',font:{size:10}}}},scales:{x:{grid:{color:GR},ticks:{color:TX,font:{size:9},maxRotation:45}},y:{grid:{color:GR},ticks:{color:TX,font:{size:9}}}}});
}

// ─── 2. DETECCIÓN DE ANOMALÍAS ────────────────────────────────
function renderMLAnomalias() {
  var c = document.getElementById('page-content');
  var anomalias = [];
  filteredData.forEach(function(prod) {
    var hist = genHistoria(prod, 30);
    var stats = stdDev(hist);
    var ma7 = movingAvg(hist, 7);
    // Detectar caídas bruscas: último valor vs media móvil
    var ultimos3 = hist.slice(-3);
    var promUlt = ultimos3.reduce(function(s,v){return s+v;},0)/3;
    var zscore = stats.std > 0 ? (promUlt - stats.mean) / stats.std : 0;
    var caida = stats.mean > 0 ? (promUlt - stats.mean) / stats.mean * 100 : 0;
    var tipo = null, severidad = null;
    if(zscore < -2.0){tipo='Caida severa';severidad='r';}
    else if(zscore < -1.5){tipo='Caida moderada';severidad='y';}
    else if(zscore > 2.0){tipo='Pico inusual';severidad='b';}
    else if(prod.stock === 0 && prod.promDia > 0.5){tipo='Sin stock con alta demanda';severidad='r';}
    else if(prod.conv < 0.5 && prod.ordenes > 5){tipo='Caida en conversion';severidad='y';}
    if(tipo) {
      anomalias.push({
        sku:prod.sku, nombre:prod.nombre, tipo:tipo, severidad:severidad,
        zscore:zscore.toFixed(2), caida:caida.toFixed(1),
        promReal:stats.mean.toFixed(2), promUlt:promUlt.toFixed(2),
        impacto: Math.abs(Math.round(caida/100 * stats.mean * 30 * prod.precio)),
        hist:hist, ma:ma7
      });
    }
  });
  anomalias.sort(function(a,b){return Math.abs(parseFloat(b.zscore))-Math.abs(parseFloat(a.zscore));});

  c.innerHTML='<div class="ml-info-banner">'+
    '<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'+
    '<span>Modelo: <strong>Deteccion por Z-Score + media movil 7 dias</strong> · Umbral: ±1.5 desviaciones estandar · '+anomalias.length+' anomalias detectadas</span>'+
    '</div>'+
    '<div class="kgrid">'+
    kc('Anomalias totales',''+anomalias.length,['ne','detectadas'],'y')+
    kc('Caidas severas',''+anomalias.filter(function(a){return a.severidad==='r';}).length,['ne','z-score &lt; -2.0'],'r')+
    kc('Picos inusuales',''+anomalias.filter(function(a){return a.tipo==='Pico inusual';}).length,['ne','z-score &gt; 2.0'],'b')+
    kc('Impacto revenue','$'+fmt(anomalias.reduce(function(s,a){return s+a.impacto;},0)),['ne','estimado en riesgo'],'r')+
    '</div>';

  if(!anomalias.length){
    c.innerHTML+='<div class="empty-state" style="padding:60px">✓ No se detectaron anomalias significativas en el periodo actual</div>';
    return;
  }

  c.innerHTML+='<div class="panel"><div class="ph"><div class="ph-left"><div class="pt">Anomalias detectadas</div><div class="ps">Productos con comportamiento estadisticamente inusual</div></div>'+
    '<div class="ph-filters"><select id="an-sev" onchange="filterAnom()"><option value="">Todas</option><option value="r">Critica</option><option value="y">Moderada</option><option value="b">Pico</option></select></div></div>'+
    '<div id="an-list">'+renderAnomList(anomalias)+'</div></div>'+
    '<div class="panel"><div class="ph"><div class="ph-left"><div class="pt">Detalle de anomalia</div><div class="ps">Selecciona una fila para ver el grafico</div></div></div>'+
    '<div class="pb"><div class="chart-wrap tall"><canvas id="ch-anom" role="img" aria-label="Anomalia">Anomalia.</canvas></div></div></div>';

  window._mlAnomalias = anomalias;
  renderAnomChart(anomalias[0]);
  setTimeout(function(){
    document.querySelectorAll('.anom-row').forEach(function(row,i){
      row.style.cursor='pointer';
      row.onclick=function(){renderAnomChart(window._mlAnomalias[i]);};
    });
  },100);
}

  return '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>#</th><th>SKU</th><th>Producto</th><th>Tipo anomalia</th><th>Z-Score</th><th>Variacion</th><th>Prom. normal</th><th>Prom. reciente</th><th>Impacto est.</th></tr></thead><tbody>'+

// ─── 3. PUNTO DE REORDEN INTELIGENTE ─────────────────────────
function renderMLReorden() {
  var c = document.getElementById('page-content');
  var reordenes = filteredData.map(function(prod) {
    var hist = genHistoria(prod, 60);
    var stats = stdDev(hist);
    var leadTime = 7; // dias
    var zConf = 1.645; // 95% nivel de servicio
    var demandaLT = stats.mean * leadTime;
    var sseguridad = zConf * stats.std * Math.sqrt(leadTime);
    var puntoReorden = Math.ceil(demandaLT + sseguridad);
    var alertaHoy = prod.stock <= puntoReorden;
    var nivelServicio = 95;
    var cobertura = prod.promDia > 0 ? Math.round(prod.stock / prod.promDia) : 9999;
    return {
      sku:prod.sku, nombre:prod.nombre, estado:prod.estado,
      stock:prod.stock, promDia:stats.mean.toFixed(2),
      stdDia:stats.std.toFixed(2), leadTime:leadTime,
      sseguridad:Math.ceil(sseguridad), puntoReorden:puntoReorden,
      alertaHoy:alertaHoy, nivelServicio:nivelServicio,
      cobertura:cobertura
    };
  }).sort(function(a,b){return (b.alertaHoy-a.alertaHoy)||(a.cobertura-b.cobertura);});

  c.innerHTML='<div class="ml-info-banner">'+
    '<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>'+
    '<span>Modelo: <strong>EOQ + Stock de seguridad</strong> · Formula: ROP = Demanda·LT + Z·σ·√LT · Lead time supuesto: 7 dias · Nivel de servicio: 95%</span>'+
    '</div>'+
    '<div class="kgrid">'+
    kc('Deben reordenarse YA',''+reordenes.filter(function(r){return r.alertaHoy;}).length,['ne','stock ≤ punto reorden'],'r')+
    kc('Stock seguro',''+reordenes.filter(function(r){return !r.alertaHoy;}).length,['ne','sobre el punto reorden'],'g')+
    kc('Stock seguridad total',''+reordenes.reduce(function(s,r){return s+r.sseguridad;},0)+' uds',['ne','para absorber variabilidad'],'b')+
    kc('Nivel de servicio','95%',['ne','probabilidad de no quiebre'],'p')+
    '</div>'+
    panelF('Punto de reorden por producto','Calculado con variabilidad real de demanda',
      '<input type="text" id="rp2-q" placeholder="Buscar..." oninput="filterReorden(this.value)" style="width:160px">'+
      '<select id="rp2-al" onchange="filterReorden2()"><option value="">Todos</option><option value="1">Solo alertas</option><option value="0">Sin alerta</option></select>',
      '<div id="rp2-tbl">'+renderReordenTable(reordenes)+'</div>'

  window._mlReordenes = reordenes;
}

// ─── 4. RIESGO DE QUIEBRE DE STOCK ────────────────────────────
function renderMLQuiebre() {
  var c = document.getElementById('page-content');
  var quiebres = filteredData.map(function(prod) {
    var hist = genHistoria(prod, 30);
    var stats = stdDev(hist);
    if(!prod.stock || !prod.promDia) return null;
    var diasHasta = prod.stock / prod.promDia;
    var variabilidad = stats.std / (stats.mean||1);
    // Probabilidad de quiebre usando distribución normal aproximada
    var prob7 = Math.max(0,Math.min(100, (1 - diasHasta/7) * 100 * (1 + variabilidad)));
    var prob14 = Math.max(0,Math.min(100, (1 - diasHasta/14) * 100 * (1 + variabilidad)));
    var prob30 = Math.max(0,Math.min(100, (1 - diasHasta/30) * 100 * (1 + variabilidad)));
    return {
      sku:prod.sku, nombre:prod.nombre, stock:prod.stock,
      diasEst:Math.round(diasHasta), variabilidad:(variabilidad*100).toFixed(0),
      prob7:Math.round(prob7), prob14:Math.round(prob14), prob30:Math.round(prob30),
      riesgo: prob14>70?'r':prob14>40?'y':'g',
      impacto: Math.round(prod.promDia * 14 * prod.precio)
    };
  }).filter(Boolean).sort(function(a,b){return b.prob14-a.prob14;});

  c.innerHTML='<div class="ml-info-banner">'+
    '<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>'+
    '<span>Modelo: <strong>Probabilidad de quiebre</strong> basada en dias de cobertura + coeficiente de variacion de demanda · Mayor variabilidad = mayor riesgo</span>'+
    '</div>'+
    '<div class="kgrid">'+
    kc('Alto riesgo (7d)',''+quiebres.filter(function(q){return q.prob7>50;}).length,['ne','prob. &gt;50% quiebre'],'r')+
    kc('Alto riesgo (14d)',''+quiebres.filter(function(q){return q.prob14>50;}).length,['ne','prob. &gt;50% quiebre'],'y')+
    kc('Bajo riesgo',''+quiebres.filter(function(q){return q.riesgo==='g';}).length,['ne','prob. &lt;40%'],'g')+
    kc('Revenue en riesgo 14d','$'+fmt(quiebres.filter(function(q){return q.prob14>50;}).reduce(function(s,q){return s+q.impacto;},0)),['ne','estimado'],'r')+
    '</div>'+
    panelF('Probabilidad de quiebre de stock','Calculada con variabilidad historica de demanda',
      '<input type="text" id="qb-q" placeholder="Buscar..." oninput="filterQuiebre(this.value)" style="width:160px">'+
      '<select id="qb-r" onchange="filterQuiebre2()"><option value="">Todo</option><option value="r">Alto riesgo</option><option value="y">Riesgo medio</option><option value="g">Bajo riesgo</option></select>',
      '<div id="qb-tbl">'+renderQuiebreTable(quiebres)+'</div>'
    );
  window._mlQuiebres = quiebres;
}

// ─── 5. SEGMENTACIÓN DE CLIENTES (K-MEANS simplificado) ───────
function renderMLSegmentacion() {
  var c = document.getElementById('page-content');
  // Simular clientes con frecuencia + ticket (RFM simplificado)
  var clientes = [];
  var seed = 42;
  function rng(s){var x=Math.sin(s*9301+49297)*233280;return x-Math.floor(x);}
  for(var i=0;i<271;i++){
    var frec = Math.floor(rng(i)*4)+1;
    var ticket = 20000+Math.floor(rng(i*2)*80000);
    var recencia = Math.floor(rng(i*3)*60)+1;
    var segmento, color;
    if(frec>=3&&ticket>50000&&recencia<20){segmento='VIP';color='p';}
    else if(frec>=2&&recencia<30){segmento='Recurrente';color='g';}
    else if(recencia<15){segmento='Nuevo activo';color='b';}
    else{segmento='En riesgo';color='r';}
    clientes.push({id:'C-'+String(i+1).padStart(4,'0'),frec:frec,ticket:ticket,recencia:recencia,segmento:segmento,color:color});
  }
  var segStats={};
  clientes.forEach(function(cl){
    if(!segStats[cl.segmento]) segStats[cl.segmento]={count:0,tickets:[],color:cl.color};
    segStats[cl.segmento].count++;
    segStats[cl.segmento].tickets.push(cl.ticket);
  });
  Object.keys(segStats).forEach(function(k){
    var s=segStats[k];
    s.avgTicket=Math.round(s.tickets.reduce(function(a,b){return a+b;},0)/s.tickets.length);
    s.revenue=s.count*s.avgTicket;
  });

  c.innerHTML='<div class="ml-info-banner">'+
    '<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>'+
    '<span>Modelo: <strong>Segmentacion RFM</strong> (Recencia, Frecuencia, Valor monetario) · 4 segmentos identificados · '+clientes.length+' compradores analizados</span>'+
    '</div>'+
    '<div class="kgrid">'+
    Object.entries(segStats).map(function(e){return kc(e[0],''+e[1].count+' clientes',['ne','$'+fmt(e[1].avgTicket)+' ticket prom.'],e[1].color);}).join('')+
    '</div>'+
    '<div class="two">'+
    panel('Distribucion de segmentos','Revenue por segmento',
      '<div class="chart-wrap sm"><canvas id="ch-seg" role="img" aria-label="Segmentos">Segmentos.</canvas></div>'
    )+
    panel('Matriz RFM — Frecuencia vs Ticket','Cada punto es un cliente',
      '<div class="chart-wrap sm"><canvas id="ch-rfm" role="img" aria-label="Matriz RFM">RFM.</canvas></div>'
    )+'</div>'+
    panelF('Detalle de clientes por segmento','',
      '<select id="seg-sel" onchange="filterSeg()"><option value="">Todos los segmentos</option>'+
      Object.keys(segStats).map(function(k){return '<option value="'+k+'">'+k+'</option>';}).join('')+
      '</select><input type="text" id="seg-q" placeholder="ID cliente..." oninput="filterSeg()" style="width:130px">',
      '<div id="seg-tbl">'+renderSegTable(clientes.slice(0,50))+'</div>'
    );
  window._mlClientes = clientes;

  // Charts
  setTimeout(function(){
    var segs=Object.keys(segStats);
    var colors={'VIP':'#bc8cff','Recurrente':'#3fb950','Nuevo activo':'#58a6ff','En riesgo':'#f85149'};
    if(charts['ch-seg']){charts['ch-seg'].destroy();}
    charts['ch-seg']=new Chart(document.getElementById('ch-seg'),{type:'doughnut',data:{labels:segs,datasets:[{data:segs.map(function(k){return segStats[k].count;}),backgroundColor:segs.map(function(k){return colors[k]||'#888';}),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'bottom',labels:{color:'#6e7681',font:{size:10}}}}}});

    if(charts['ch-rfm']){charts['ch-rfm'].destroy();}
    var datasets=Object.keys(segStats).map(function(k){
      var pts=clientes.filter(function(cl){return cl.segmento===k;}).slice(0,30).map(function(cl){return {x:cl.frec,y:Math.round(cl.ticket/1000)};});
      return {label:k,data:pts,backgroundColor:colors[k]||'#888',pointRadius:4};
    });
    charts['ch-rfm']=new Chart(document.getElementById('ch-rfm'),{type:'scatter',data:{datasets:datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top',labels:{color:'#6e7681',font:{size:10}}}},scales:{x:{grid:{color:GR},ticks:{color:TX},title:{display:true,text:'Frecuencia',color:TX}},y:{grid:{color:GR},ticks:{color:TX,callback:function(v){return '$'+v+'k';}}}}}});
  },80);
}

// ─── 6. DEMANDA VARIABLE ──────────────────────────────────────
function renderMLDemanda() {
  var c = document.getElementById('page-content');
  var demandas = filteredData.map(function(prod) {
    var hist = genHistoria(prod, 60);
    var stats = stdDev(hist);
    var cv = stats.mean > 0 ? (stats.std/stats.mean*100).toFixed(1) : '0';
    var ma7 = movingAvg(hist, 7).filter(Boolean);
    var ma14 = movingAvg(hist, 14).filter(Boolean);
    // Tendencia de largo plazo
    var xs = hist.map(function(v,i){return i;});
    var reg = linReg(xs, hist);
    var trendLabel = reg.m > 0.02 ? 'Creciente' : reg.m < -0.02 ? 'Decreciente' : 'Estable';
    var trendCls = reg.m > 0.02 ? 'g' : reg.m < -0.02 ? 'r' : 'y';
    // Estacionalidad semanal
    var diasSemana=['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
    var porDia=[0,0,0,0,0,0,0]; var cntDia=[0,0,0,0,0,0,0];
    hist.forEach(function(v,i){var d=i%7;porDia[d]+=v;cntDia[d]++;});
    var promPorDia=porDia.map(function(v,i){return cntDia[i]?v/cntDia[i]:0;});
    var diaTop=promPorDia.indexOf(Math.max.apply(null,promPorDia));
    return {
      sku:prod.sku, nombre:prod.nombre,
      mean:stats.mean.toFixed(2), std:stats.std.toFixed(2), cv:cv,
      trendLabel:trendLabel, trendCls:trendCls, trendM:reg.m.toFixed(3),
      diaTop:diasSemana[diaTop], hist:hist, ma7:ma7, ma14:ma14, promPorDia:promPorDia
    };
  }).sort(function(a,b){return parseFloat(b.cv)-parseFloat(a.cv);});

  c.innerHTML='<div class="ml-info-banner">'+
    '<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>'+
    '<span>Modelo: <strong>Analisis de variabilidad + estacionalidad</strong> · CV = coeficiente de variacion · Alta variabilidad requiere mayor stock de seguridad</span>'+
    '</div>'+
    '<div class="kgrid">'+
    kc('Alta variabilidad (CV>50%)',''+demandas.filter(function(d){return parseFloat(d.cv)>50;}).length,['ne','demanda impredecible'],'r')+
    kc('Media (CV 20-50%)',''+demandas.filter(function(d){return parseFloat(d.cv)>=20&&parseFloat(d.cv)<=50;}).length,['ne','demanda normal'],'y')+
    kc('Baja (CV<20%)',''+demandas.filter(function(d){return parseFloat(d.cv)<20;}).length,['ne','demanda predecible'],'g')+
    kc('Tendencias crecientes',''+demandas.filter(function(d){return d.trendLabel==='Creciente';}).length,['up','productos en alza'],'b')+
    '</div>'+
    panelF('Variabilidad de demanda por producto','Mayor CV = mas stock de seguridad necesario',
      '<input type="text" id="dm-q" placeholder="Buscar..." oninput="filterDemanda(this.value)" style="width:160px">'+
      '<select id="dm-tr" onchange="filterDemanda2()"><option value="">Todas tendencias</option><option value="Creciente">Creciente</option><option value="Decreciente">Decreciente</option><option value="Estable">Estable</option></select>',
      '<div id="dm-tbl">'+renderDemandaTable(demandas)+'</div>'
    )+
    '<div class="panel"><div class="ph"><div class="ph-left"><div class="pt">Estacionalidad semanal — clic en producto para ver</div><div class="ps">Promedio de ventas por dia de la semana</div></div></div>'+
    '<div class="pb"><div class="chart-wrap"><canvas id="ch-dem" role="img" aria-label="Estacionalidad semanal">Estacionalidad.</canvas></div></div></div>';

  window._mlDemandas = demandas;
  renderDemandaChart(demandas[0]);

  setTimeout(function(){
    document.querySelectorAll('.dm-row').forEach(function(row,i){
      row.style.cursor='pointer';
      row.onclick=function(){renderDemandaChart(window._mlDemandas[i]);};
    });
  },100);
}

function filterStock(q){
  var est=document.getElementById('sk-est').value;
  var ord=document.getElementById('sk-ord').value||'dias';
  var d=filteredData.filter(function(p){
    return (!q||p.nombre.toLowerCase().includes(q.toLowerCase())||p.sku.toLowerCase().includes(q.toLowerCase()))&&
           (!est||p.estado===est);
  }).sort(function(a,b){
    if(ord==='dias'){if(a.dias>=9999&&b.dias>=9999)return 0;if(a.dias>=9999)return 1;if(b.dias>=9999)return -1;return a.dias-b.dias;}
    if(ord==='stock') return a.stock-b.stock;
    return b.ordenes-a.ordenes;
  });
  document.getElementById('sk-tbl').innerHTML=productTable(d,['stock','promDia','dias','ordenes','estado']);
}

function renderForecast7(){

    );
  var labels=[],hist=[],fore=[];
  var hoy=new Date();
  for(var i=-14;i<=7;i++){
    var d=new Date(hoy);d.setDate(d.getDate()+i);

    else{hist.push(null);fore.push(Math.round(380000+i*8000+Math.random()*50000));}
  }
  mkChart('ch-fc7','line',labels,
    [{label:'Historico',data:hist,borderColor:'#bc8cff',backgroundColor:'rgba(188,140,255,0.08)',fill:true,tension:.4,pointRadius:3,borderWidth:2},
     {label:'Forecast',data:fore,borderColor:'#3fb950',backgroundColor:'rgba(63,185,80,0.06)',fill:true,tension:.4,pointRadius:3,borderWidth:2,borderDash:[5,3]}],
    {plugins:{legend:{display:true,position:'top',labels:{color:'#6e7681',font:{size:11}}}},scales:{x:{grid:{color:GR},ticks:{color:TX,font:{size:9},maxRotation:45}},y:{grid:{color:GR},ticks:{color:TX,callback:function(v){return '$'+Math.round(v/1000)+'k';}}}}});
}
