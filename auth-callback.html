<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conectando con Mercado Libre...</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0D1B2A;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.box{background:#fff;border-radius:16px;padding:40px;text-align:center;max-width:400px;width:90%}
.logo{font-size:32px;margin-bottom:16px}
h2{font-size:18px;color:#0D1B2A;margin-bottom:8px}
p{font-size:14px;color:#666;margin-bottom:24px}
.spinner{width:36px;height:36px;border:3px solid #f0f0f0;border-top-color:#C9A84C;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.ok{color:#1D9E75;font-size:40px;display:none}
.err{color:#E74C3C;font-size:14px;display:none;background:#FCEBEB;padding:12px;border-radius:8px;margin-top:12px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">🏠</div>
  <h2>Ganga Home</h2>
  <div class="spinner" id="spinner"></div>
  <div class="ok" id="ok">✓</div>
  <p id="msg">Conectando con Mercado Libre...</p>
  <div class="err" id="err"></div>
</div>

<script>
const WORKER = 'https://ganga-worker.gangahome.workers.dev';

async function main() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');

  if (error) {
    showError('ML rechazó la autorización: ' + error);
    return;
  }
  if (!code) {
    showError('No se recibió el código de autorización.');
    return;
  }

  try {
    document.getElementById('msg').textContent = 'Guardando tokens...';
    const res = await fetch(WORKER + '/exchange', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || 'Error del servidor');

    document.getElementById('spinner').style.display = 'none';
    document.getElementById('ok').style.display = 'block';
    document.getElementById('msg').textContent = '¡Conectado! Redirigiendo a la app...';

    setTimeout(() => {
      window.location.href = 'https://lucasbarranco-blip.github.io/app-gnga/';
    }, 2000);

  } catch(e) {
    showError(e.message);
  }
}

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('msg').textContent = 'Ocurrió un error';
  const err = document.getElementById('err');
  err.textContent = msg;
  err.style.display = 'block';
}

main();
</script>
</body>
</html>
